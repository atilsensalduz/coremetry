{{- if .Values.javaDemo.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qmetry.fullname" . }}-java-demo
  labels:
    {{- include "qmetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: java-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "qmetry.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: java-demo
  template:
    metadata:
      labels:
        {{- include "qmetry.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: java-demo
    spec:
      {{- include "qmetry.imagePullSecrets" (dict "imageRoot" .Values.javaDemo.image "global" .Values.global) | nindent 6 }}
      containers:
        - name: java-demo
          image: {{ include "qmetry.image" (dict "imageRoot" .Values.javaDemo.image "global" .Values.global "defaultTag" .Chart.AppVersion) | quote }}
          imagePullPolicy: {{ .Values.javaDemo.image.pullPolicy }}
          ports:
            - { name: http, containerPort: 8080 }
          env:
            # OTel auto-instrumentation — agent injected by the demo's
            # Dockerfile, just point it at the in-cluster collector.
            - name: OTEL_SERVICE_NAME
              value: java-demo
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=demo,host.name=java-demo,service.version={{ .Chart.AppVersion }}"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ if .Values.otelCollector.enabled -}}
                       "http://{{ include "qmetry.fullname" . }}-otelcol:{{ .Values.otelCollector.service.grpcPort }}"
                     {{- else -}}
                       "http://{{ include "qmetry.fullname" . }}:{{ .Values.service.grpcPort }}"
                     {{- end }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_METRICS_EXPORTER
              value: otlp
            - name: OTEL_LOGS_EXPORTER
              value: otlp
            - name: OTEL_INSTRUMENTATION_LOGBACK_APPENDER_ENABLED
              value: "true"
            - name: OTEL_INSTRUMENTATION_RUNTIME_TELEMETRY_ENABLED
              value: "true"
            - name: OTEL_METRIC_EXPORT_INTERVAL
              value: "10000"
            # Profile pusher (sidecar shell script — not OTel) → posts
            # async-profiler output to qmetry's /v1/profiles endpoint.
            - name: QMETRY_URL
              value: "http://{{ include "qmetry.fullname" . }}:{{ .Values.service.httpPort }}"
            - name: PROFILE_INTERVAL_SEC
              value: "15"
            - name: PROFILE_WINDOW_SEC
              value: "10"
            - name: PROFILE_ENGINE
              value: wall
            {{- with .Values.javaDemo.extraEnv }}
            {{ toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet: { path: /actuator/health, port: http }
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet: { path: /actuator/health, port: http }
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 4
          resources: {{- toYaml .Values.javaDemo.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "qmetry.fullname" . }}-java-demo
  labels:
    {{- include "qmetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: java-demo
spec:
  type: {{ .Values.javaDemo.service.type }}
  selector:
    {{- include "qmetry.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: java-demo
  ports:
    - name: http
      port: {{ .Values.javaDemo.service.port }}
      targetPort: http
{{- end -}}
