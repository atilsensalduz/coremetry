{{- if .Values.otelCollector.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "coremetry.fullname" . }}-otelcol
  labels:
    {{- include "coremetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
          http: { endpoint: 0.0.0.0:4318, cors: { allowed_origins: ["*"] } }
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 512
        spike_limit_mib: 128
      batch:
        timeout: 5s
        send_batch_size: 1000
    exporters:
      otlp/coremetry:
        # Mode-aware target: in distributed mode the OTLP gRPC receiver runs
        # on the INGEST role (the stable <release> Service aliases the API
        # role, which serves HTTP only and binds no :4317), so forward to
        # <release>-ingest. In monolithic mode the all-mode pod receives, so
        # the stable Service is correct. (v0.6.69 — without this, distributed
        # installs silently dropped every span at the api pod.)
        endpoint: {{ include "coremetry.fullname" . }}{{ if eq .Values.deployment.mode "distributed" }}-ingest{{ end }}:{{ .Values.service.grpcPort }}
        tls: { insecure: true }
        sending_queue: { enabled: true, num_consumers: 4, queue_size: 5000 }
        retry_on_failure: { enabled: true, initial_interval: 1s, max_interval: 30s }
      {{- if .Values.otelCollector.oneuptime.enabled }}
      # v0.6.70 — cloud fan-out: ALSO forward every signal to a second OTLP/HTTP
      # backend (OneUptime, Grafana Cloud, any OTLP/HTTP ingest), in ADDITION to
      # the in-cluster Coremetry ingest. Independent sending_queue + retry so a
      # cloud-backend outage back-pressures only its own queue, never the
      # Coremetry export. The auth token is sourced from a Secret via the
      # ONEUPTIME_TOKEN env (never inlined in this ConfigMap); the otlphttp
      # exporter auto-appends /v1/{traces,metrics,logs} to the base endpoint,
      # which matches OneUptime's /otlp ingest path.
      otlphttp/oneuptime:
        endpoint: {{ .Values.otelCollector.oneuptime.endpoint | quote }}
        headers:
          {{ .Values.otelCollector.oneuptime.tokenHeader }}: "${env:ONEUPTIME_TOKEN}"
        sending_queue: { enabled: true, num_consumers: 4, queue_size: 5000 }
        retry_on_failure: { enabled: true, initial_interval: 1s, max_interval: 30s }
      {{- end }}
    service:
      pipelines:
        traces:  { receivers: [otlp], processors: [memory_limiter, batch], exporters: [otlp/coremetry{{ if .Values.otelCollector.oneuptime.enabled }}, otlphttp/oneuptime{{ end }}] }
        metrics: { receivers: [otlp], processors: [memory_limiter, batch], exporters: [otlp/coremetry{{ if .Values.otelCollector.oneuptime.enabled }}, otlphttp/oneuptime{{ end }}] }
        logs:    { receivers: [otlp], processors: [memory_limiter, batch], exporters: [otlp/coremetry{{ if .Values.otelCollector.oneuptime.enabled }}, otlphttp/oneuptime{{ end }}] }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coremetry.fullname" . }}-otelcol
  labels:
    {{- include "coremetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "coremetry.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: otel-collector
  template:
    metadata:
      labels:
        {{- include "coremetry.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: otel-collector
    spec:
      {{- include "coremetry.imagePullSecrets" (dict "imageRoot" .Values.otelCollector.image "global" .Values.global) | nindent 6 }}
      containers:
        - name: otelcol
          image: {{ include "coremetry.image" (dict "imageRoot" .Values.otelCollector.image "global" .Values.global) | quote }}
          # SCC-friendly — same restricted-v2 profile as the main app.
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
          args: ["--config=/etc/otelcol/config.yaml"]
          {{- if .Values.otelCollector.oneuptime.enabled }}
          # Cloud-backend ingestion token — sourced from a Secret, exposed to the
          # collector as ${env:ONEUPTIME_TOKEN} (referenced in the exporter
          # header above). Never inlined in the ConfigMap. (v0.6.70)
          env:
            - name: ONEUPTIME_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ required "otelCollector.oneuptime.existingSecret is required when otelCollector.oneuptime.enabled=true" .Values.otelCollector.oneuptime.existingSecret }}
                  key: {{ .Values.otelCollector.oneuptime.tokenSecretKey | default "token" }}
          {{- end }}
          ports:
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: otlp-http, containerPort: 4318 }
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
          resources: {{- toYaml .Values.otelCollector.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "coremetry.fullname" . }}-otelcol
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "coremetry.fullname" . }}-otelcol
  labels:
    {{- include "coremetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
spec:
  type: {{ .Values.otelCollector.service.type }}
  selector:
    {{- include "coremetry.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
  ports:
    - name: otlp-grpc
      port: {{ .Values.otelCollector.service.grpcPort }}
      targetPort: otlp-grpc
    - name: otlp-http
      port: {{ .Values.otelCollector.service.httpPort }}
      targetPort: otlp-http
{{- end -}}
