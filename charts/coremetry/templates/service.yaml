apiVersion: v1
kind: Service
metadata:
  name: {{ include "coremetry.fullname" . }}
  labels:
    {{- include "coremetry.labels" . | nindent 4 }}
    app.kubernetes.io/component: coremetry
  {{- with .Values.service.annotations }}
  annotations: {{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  # Component-scoped selector — without this the Service routed to ALL
  # pods sharing the chart-wide name+instance labels (CH, Redis, OTel
  # Collector), which silently dropped traces and broke the UI.
  selector:
    {{- include "coremetry.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: coremetry
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: otlp-grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: otlp-grpc
      protocol: TCP
