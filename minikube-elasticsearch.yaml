# Standalone single-node Elasticsearch for the minikube dev stack (v0.7.x).
#
# Coremetry's production pattern is an EXTERNAL ES that the operator's existing
# log pipeline ships to (CLAUDE.md invariant #2: CH is the write store; ES is a
# READ backend). This manifest stands up a throwaway single-node ES in the
# minikube `coremetry` namespace so we can exercise that ES read path locally:
# the otel-collector dual-ships logs here (elasticsearch exporter) while still
# writing to CH, and Coremetry's logs.backend=elasticsearch reads them back.
#
# Dev-only choices: security disabled (no TLS/auth), emptyDir data (wiped on
# restart), node.store.allow_mmap=false so we don't need the privileged
# vm.max_map_count=262144 sysctl, disk watermarks off (minikube disks are
# small). DO NOT use this for anything but local validation.
#
#   kubectl apply -f minikube-elasticsearch.yaml
#   # then helm upgrade with values-minikube.yaml (logs.backend=elasticsearch
#   # + otelCollector.elasticsearch.enabled=true)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coremetry-elasticsearch
  namespace: coremetry
  labels:
    app.kubernetes.io/component: elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: elasticsearch
  template:
    metadata:
      labels:
        app.kubernetes.io/component: elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
          env:
            - { name: discovery.type, value: single-node }
            - { name: cluster.name, value: coremetry-es }
            - { name: node.name, value: es0 }
            - { name: xpack.security.enabled, value: "false" }
            - { name: bootstrap.memory_lock, value: "false" }
            - { name: node.store.allow_mmap, value: "false" }
            - { name: cluster.routing.allocation.disk.threshold_enabled, value: "false" }
            - { name: ES_JAVA_OPTS, value: "-Xms512m -Xmx512m" }
          ports:
            - { name: http, containerPort: 9200 }
          readinessProbe:
            httpGet:
              path: "/_cluster/health?wait_for_status=yellow&timeout=5s"
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          resources:
            requests: { cpu: 250m, memory: 768Mi }
            limits:   { cpu: "1",  memory: 1536Mi }
          volumeMounts:
            - { name: data, mountPath: /usr/share/elasticsearch/data }
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: coremetry-elasticsearch
  namespace: coremetry
  labels:
    app.kubernetes.io/component: elasticsearch
spec:
  selector:
    app.kubernetes.io/component: elasticsearch
  ports:
    - { name: http, port: 9200, targetPort: http }
