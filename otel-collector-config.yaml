# OpenTelemetry Collector configuration for Coremetry.
#
# Pipelines:
#   apps  ──▶ otel-collector (OTLP gRPC :4317 / HTTP :4318)
#         ─┬─▶ otlp/coremetry  (traces sampled 30% + metrics 100%
#          │                   + logs 100% via ES exporter)
#          ├─▶ otlp/tempo      (traces 100% — Coremetry's Tempo-backend
#          │                   fallback reads from here when the 30%
#          │                   sample missed a trace_id)
#          └─▶ elasticsearch   (logs 100% — Coremetry's ES log
#                              backend reads from here when
#                              COREMETRY_LOGS_BACKEND=elasticsearch)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 32
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins: ["*"]

processors:
  # Drop data if memory pressure is high (back-pressure).
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  # Batch before forwarding to reduce request count.
  batch:
    timeout: 5s
    send_batch_size: 1000
    send_batch_max_size: 2000

  # Tag every record so we can tell what came through the collector.
  resource:
    attributes:
      - key: telemetry.processed_by
        value: otel-collector
        action: upsert

  # Probabilistic sampler — drops traces by trace_id hash BEFORE
  # the coremetry exporter. Tempo gets 100% (separate pipeline
  # below), so trace IDs Coremetry drops are still resolvable
  # via Settings → Tempo backend fallback on /trace?id=...
  # 30% keeps a useful slice in Coremetry while leaving ~70%
  # of trace IDs as Tempo-only — exactly the case the fallback
  # is built for.
  probabilistic_sampler/coremetry:
    sampling_percentage: 30

exporters:
  # Send everything to Coremetry over OTLP/gRPC (insecure inside the docker network).
  otlp/coremetry:
    endpoint: coremetry:4317
    tls:
      insecure: true
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 5000
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 5m

  # Logs sink — writes one document per LogRecord to a fixed index.
  # `mapping.mode: ecs` puts trace.id / span.id / service.name at canonical
  # ECS paths, which matches Coremetry's ES backend default field map so
  # /api/logs?traceId=... correlates without any extra config.
  elasticsearch:
    endpoints: ["http://elasticsearch:9200"]
    logs_index: "logs-otel-default"
    mapping:
      mode: ecs
    sending_queue:
      enabled: true
      num_consumers: 2
      queue_size: 5000
    # ES exporter uses `retry`, not the standard `retry_on_failure` block,
    # and accepts only enabled/max_requests/initial_interval/max_interval.
    retry:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_requests: 5

  # Tempo OTLP sink — receives 100% of traces (no sampler in
  # the pipeline below). Coremetry's Settings → Tempo backend
  # points at http://tempo:3200 to read these back when the
  # 30% Coremetry slice missed a trace_id.
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 5000
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 5m

  # Useful for debugging — toggle verbosity to "detailed" to see payloads.
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777

service:
  extensions: [health_check, pprof]
  telemetry:
    logs:
      level: info
  pipelines:
    # Coremetry trace pipeline — sampled at 30% via
    # probabilistic_sampler so the rest land Tempo-only and
    # exercise the fallback.
    traces/coremetry:
      receivers:  [otlp]
      processors: [memory_limiter, resource, probabilistic_sampler/coremetry, batch]
      exporters:  [otlp/coremetry]
    # Tempo trace pipeline — 100% retention. Same receivers,
    # no sampler.
    traces/tempo:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [otlp/tempo]
    metrics:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [otlp/coremetry]
    # Logs go to BOTH sinks: ES is the read source for the Coremetry UI when
    # COREMETRY_LOGS_BACKEND=elasticsearch; otlp/coremetry keeps the
    # ClickHouse path warm so flipping the backend back is one env flip.
    logs:
      receivers:  [otlp]
      processors: [memory_limiter, resource, batch]
      exporters:  [otlp/coremetry, elasticsearch]
