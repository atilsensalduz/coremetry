name: Release

on:
  push:
    tags: ['v*.*.*']
  # Manual trigger so a maintainer can re-publish without re-tagging.
  workflow_dispatch:

permissions:
  contents: write       # create release + push to gh-pages branch
  packages: write       # push image to ghcr.io

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # cilcenk/qmetry

jobs:
  docker:
    name: Build + push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build + push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    name: Package + publish Helm chart
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@v4
        with:
          version: 'v3.15.0'
      - name: Sync Chart appVersion to git tag
        run: |
          # Strip the leading "v" from refs/tags/v0.1.0 → 0.1.0
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version:.*/version: $VERSION/"     charts/qmetry/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/qmetry/Chart.yaml
      - name: Package chart
        run: helm package charts/qmetry --destination .helm-out
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .helm-out
          publish_branch: gh-pages
          keep_files: true       # don't wipe older chart versions
          enable_jekyll: false

  release:
    name: GitHub Release
    needs: [docker, helm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Docker image: `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`
            Helm chart:   `helm install qmetry oci://ghcr.io/${{ github.repository_owner }}/qmetry-chart --version ${{ github.ref_name }}`
