# Coremetry app — stateless, horizontally scalable. State lives in
# ClickHouse + Redis. Two replicas by default for rolling-update
# coverage; bump for ingest throughput (each pod is independent).
#
# OpenShift compatibility:
#   - No runAsUser / runAsGroup / fsGroup pins — restricted-v2 SCC
#     assigns these from the namespace's allocated range. The
#     Coremetry binary is a static Go executable that only writes
#     to /tmp (mounted as emptyDir), so any non-root UID works.
#   - readOnlyRootFilesystem: true — except /tmp.
#   - All capabilities dropped + seccompProfile: RuntimeDefault.
#   - Init container shares the same image (alpine + busybox `nc`).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coremetry
  namespace: coremetry
  labels:
    app.kubernetes.io/name: coremetry
    app.kubernetes.io/component: coremetry
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: coremetry
      app.kubernetes.io/component: coremetry
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: coremetry
        app.kubernetes.io/component: coremetry
    spec:
      serviceAccountName: coremetry
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # See README.md → "init not ready" — this is the source of
        # the [init] log lines during pod startup. It is normal
        # for it to print 1-2 retry lines before ClickHouse opens
        # its TCP listener; only sustained failure is a real error.
        - name: wait-for-clickhouse
          image: ghcr.io/cilcenk/coremetry:v0.2.79
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              addr="${COREMETRY_CH_ADDR:-coremetry-clickhouse:9000}"
              host="${addr%:*}"
              port="${addr##*:}"
              echo "[init] waiting for clickhouse at $host:$port (up to 120s)"
              for i in $(seq 1 60); do
                if nc -z -w 2 "$host" "$port" 2>/dev/null; then
                  echo "[init] clickhouse is reachable, proceeding"
                  exit 0
                fi
                echo "[init] clickhouse not yet listening (poll $i/60), retrying in 2s"
                sleep 2
              done
              echo "[init] gave up after 120s — clickhouse at $host:$port never became reachable" >&2
              exit 1
          env:
            - name: COREMETRY_CH_ADDR
              value: "coremetry-clickhouse:9000"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
            readOnlyRootFilesystem: true
      containers:
        - name: coremetry
          image: ghcr.io/cilcenk/coremetry:v0.2.79
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8088
            - name: otlp-grpc
              containerPort: 4317
          env:
            - name: COREMETRY_CH_ADDR
              value: "coremetry-clickhouse:9000"
            - name: COREMETRY_REDIS_URL
              value: "redis://coremetry-redis:6379/0"
            - name: COREMETRY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: coremetry-secrets
                  key: jwt-secret
            - name: COREMETRY_INITIAL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: coremetry-secrets
                  key: initial-admin-password
            - name: COREMETRY_CH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: coremetry-secrets
                  key: clickhouse-password
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            periodSeconds: 15
            failureThreshold: 4
          resources:
            requests: { cpu: "200m", memory: 512Mi }
            limits:   { cpu: "2",    memory: 2Gi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
            readOnlyRootFilesystem: true
      volumes:
        - name: config
          configMap:
            name: coremetry-config
        - name: tmp
          emptyDir: {}
