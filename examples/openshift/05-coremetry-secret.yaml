# Replace these placeholders BEFORE applying.
#   - jwt-secret: a 32+ byte random string used to sign auth
#     tokens. Rotating it forces all users to re-login. Generate
#     with: `openssl rand -hex 32`
#   - initial-admin-password: the password for the seeded
#     admin@coremetry.local account on first boot. Once you log
#     in and change it from the UI, this value is no longer
#     consulted.
#   - clickhouse-password: leave empty if your CH is using the
#     default no-auth setup; set when pointing at a hardened CH.
apiVersion: v1
kind: Secret
metadata:
  name: coremetry-secrets
  namespace: coremetry
type: Opaque
stringData:
  jwt-secret: "REPLACE_ME_WITH_openssl_rand_hex_32"
  initial-admin-password: "ChangeMe-OnFirstLogin"
  clickhouse-password: ""
