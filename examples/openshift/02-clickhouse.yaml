# Single-replica ClickHouse for dev/POC. Production deployments
# should use the Altinity or ClickHouse-Inc operator and point
# Coremetry at it via COREMETRY_CH_ADDR — drop this file in that
# case.
#
# OpenShift compatibility:
#   - No runAsUser pin; restricted-v2 SCC will assign a UID from
#     the namespace's allocated range.
#   - The clickhouse/clickhouse-server image expects to write to
#     /var/lib/clickhouse and /var/log/clickhouse-server; both are
#     PVC-backed so the assigned UID can own them via fsGroup.
---
apiVersion: v1
kind: Service
metadata:
  name: coremetry-clickhouse
  namespace: coremetry
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: clickhouse
spec:
  clusterIP: None         # headless — StatefulSet pods are addressed by name
  ports:
    - name: native
      port: 9000
      targetPort: 9000
    - name: http
      port: 8123
      targetPort: 8123
  selector:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: clickhouse
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: coremetry-clickhouse
  namespace: coremetry
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: clickhouse
spec:
  serviceName: coremetry-clickhouse
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
      app.kubernetes.io/component: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/component: clickhouse
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.8-alpine
          ports:
            - name: native
              containerPort: 9000
            - name: http
              containerPort: 8123
          env:
            - name: CLICKHOUSE_DB
              value: coremetry
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          # ulimits/memlock are not allowed on restricted SCCs —
          # CH runs without them at the cost of a startup warning.
          # Memory cap matters more for OOMKill protection.
          resources:
            requests: { cpu: "500m", memory: 2Gi }
            limits:   { cpu: "2",    memory: 4Gi }
          readinessProbe:
            tcpSocket: { port: 9000 }
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: 9000 }
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
            readOnlyRootFilesystem: false   # CH writes config templates
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: logs
              mountPath: /var/log/clickhouse-server
      volumes:
        - name: logs
          emptyDir: {}
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 100Gi
